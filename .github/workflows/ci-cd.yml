name: CI/CD Deploy

on:
  push:
    branches: [ main ]

env:
  DEPLOY_MANAGER_URL: ${{ secrets.DEPLOY_MANAGER_URL }}

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v3
    - name: Load deploy config
      run: |
        echo "APP_NAME=$(node -p "require('./deploy-config.json').appName")" >> $GITHUB_ENV
        echo "DOMAIN=$(node -p "require('./deploy-config.json').domain")" >> $GITHUB_ENV
        echo "CONTAINER_PORT=$(node -p "require('./deploy-config.json').containerPort")" >> $GITHUB_ENV
        echo "SSL_CERTIFICATE=$(node -p "require('./deploy-config.json').sslCertificate")" >> $GITHUB_ENV
        echo "SSL_CERTIFICATE_KEY=$(node -p "require('./deploy-config.json').sslCertificateKey")" >> $GITHUB_ENV
        echo "DESIRED_INSTANCES=$(node -p "require('./deploy-config.json').desiredInstances")" >> $GITHUB_ENV
        echo "DEPLOY_MODE=$(node -p "require('./deploy-config.json').deployMode || 'canary'")" >> $GITHUB_ENV
        echo "GREEN_PERCENTAGE=$(node -p "require('./deploy-config.json').greenPercentage ?? 0")" >> $GITHUB_ENV
        echo "VPS_NAMES=$(node -p "JSON.stringify(require('./deploy-config.json').vpsTargets || [])")" >> $GITHUB_ENV
        echo "DOCKER_IMAGE_REPOSITORY=${{ secrets.DOCKERHUB_USERNAME }}/$(node -p "require('./deploy-config.json').appName")" >> $GITHUB_ENV
      shell: bash
    - name: Set up Docker
      uses: docker/setup-buildx-action@v2
    - name: Log in to Docker Hub
      uses: docker/login-action@v3
      with:
        username: ${{ secrets.DOCKERHUB_USERNAME }}
        password: ${{ secrets.DOCKERHUB_TOKEN }}
    - name: Build Docker image
      run: docker build -t ${{ env.DOCKER_IMAGE_REPOSITORY }}:${{ github.sha }} .
    - name: Push image
      run: docker push ${{ env.DOCKER_IMAGE_REPOSITORY }}:${{ github.sha }}
    - name: Notify deploy manager about image
      run: |
        curl --fail --show-error --request POST "${DEPLOY_MANAGER_URL}/webhooks/image" \
          --header "Content-Type: application/json" \
          --data '{
            "image":"'"${DOCKER_IMAGE_REPOSITORY}"':${{ github.sha }}",
            "appName":"'"${APP_NAME}"'",
            "containerPort":'"${CONTAINER_PORT}"',
            "commitSha":"${{ github.sha }}",
            "defaultDomain":"'"${DOMAIN}"'",
            "source":"github-actions"
          }'
      shell: bash
    - name: Deploy next release
      run: |
        INITIAL_GREEN=0
        if [ "${DEPLOY_MODE}" = "immediate" ]; then
          INITIAL_GREEN=100
        fi
        curl --fail --show-error --request POST "${DEPLOY_MANAGER_URL}/deploy" \
          --header "Content-Type: application/json" \
          --data '{
            "image":"'"${DOCKER_IMAGE_REPOSITORY}"':${{ github.sha }}",
            "appName":"'"${APP_NAME}"'",
            "vpsNames":'"${VPS_NAMES}"',
            "domain":"'"${DOMAIN}"'",
            "sslCertificate":"'"${SSL_CERTIFICATE}"'",
            "sslCertificateKey":"'"${SSL_CERTIFICATE_KEY}"'",
            "instances":'"${DESIRED_INSTANCES}"',
            "containerPort":'"${CONTAINER_PORT}"',
            "deployMode":"'"${DEPLOY_MODE}"'",
            "initialGreenPercentage":'"${INITIAL_GREEN}"'
          }'
      shell: bash
    - name: Shift traffic after verification
      if: env.DEPLOY_MODE == 'canary'
      run: |
        curl --fail --show-error --request POST "${DEPLOY_MANAGER_URL}/rollout" \
          --header "Content-Type: application/json" \
          --data '{
            "appName":"'"${APP_NAME}"'",
            "vpsNames":'"${VPS_NAMES}"',
            "greenPercentage":'"${GREEN_PERCENTAGE}"'
          }'
      shell: bash
