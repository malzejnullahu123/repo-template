name: CI/CD Deploy

on:
  push:
    branches: [ main ]

env:
  APP_NAME: testing-app
  DEPLOY_MANAGER_URL: ${{ secrets.DEPLOY_MANAGER_URL }}
  WORKER_URL: ${{ secrets.WORKER_URL }}
  DOMAIN: test.trior.tech
  VPS_NAME: artemiss
  SSL_CERTIFICATE: /etc/nginx/ssl/cloudflare.crt
  SSL_CERTIFICATE_KEY: /etc/nginx/ssl/cloudflare.key
  CONTAINER_PORT: 3000
  DESIRED_INSTANCES: 1
  DEPLOY_MODE: canary
  GREEN_PERCENTAGE: 10
  DOCKER_IMAGE_REPOSITORY: malzej1/testing-app

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v3
    - name: Set up Docker
      uses: docker/setup-buildx-action@v2
    - name: Log in to Docker Hub
      uses: docker/login-action@v3
      with:
        username: ${{ secrets.DOCKERHUB_USERNAME }}
        password: ${{ secrets.DOCKERHUB_TOKEN }}
    - name: Build Docker image
      run: docker build -t ${{ env.DOCKER_IMAGE_REPOSITORY }}:${{ github.sha }} .
    - name: Push image
      run: docker push ${{ env.DOCKER_IMAGE_REPOSITORY }}:${{ github.sha }}
    - name: Notify deploy manager about image
      run: |
        curl --fail --show-error --request POST "${DEPLOY_MANAGER_URL}/webhooks/image" \
          --header "Content-Type: application/json" \
          --data '{
            "image":"'"${DOCKER_IMAGE_REPOSITORY}"':${{ github.sha }}",
            "appName":"'"${APP_NAME}"'",
            "containerPort":'"${CONTAINER_PORT}"',
            "commitSha":"${{ github.sha }}",
            "defaultDomain":"'"${DOMAIN}"'",
            "source":"github-actions"
          }'
      shell: bash
    - name: Deploy next release
      run: |
        INITIAL_GREEN=0
        if [ "${DEPLOY_MODE}" = "immediate" ]; then
          INITIAL_GREEN=100
        fi
        curl --fail --show-error --request POST "${DEPLOY_MANAGER_URL}/deploy" \
          --header "Content-Type: application/json" \
          --data '{
            "image":"'"${DOCKER_IMAGE_REPOSITORY}"':${{ github.sha }}",
            "appName":"'"${APP_NAME}"'",
            "vpsNames":["'"${VPS_NAME}"'"],
            "domain":"'"${DOMAIN}"'",
            "sslCertificate":"'"${SSL_CERTIFICATE}"'",
            "sslCertificateKey":"'"${SSL_CERTIFICATE_KEY}"'",
            "instances":'"${DESIRED_INSTANCES}"',
            "containerPort":'"${CONTAINER_PORT}"',
            "deployMode":"'"${DEPLOY_MODE}"'",
            "initialGreenPercentage":'"${INITIAL_GREEN}"'
          }'
      shell: bash
    - name: Shift traffic after verification
      if: env.DEPLOY_MODE == 'canary'
      run: |
        curl --fail --show-error --request POST "${DEPLOY_MANAGER_URL}/rollout" \
          --header "Content-Type: application/json" \
          --data '{
            "appName":"'"${APP_NAME}"'",
            "vpsNames":["'"${VPS_NAME}"'"],
            "greenPercentage":'"${GREEN_PERCENTAGE}"'
          }'
      shell: bash
